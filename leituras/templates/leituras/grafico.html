{% extends 'base.html' %}

{% block titulo %}Gráfico{% endblock %}

{% block estilos_extras %}
<style>
    .chart-container {
        position: relative;
        height: 350px;
    }
</style>
{% endblock %}

{% block conteudo %}

<div class="row mb-4">
    <div class="col">
        <h2 class="fw-bold">
            <i class="bi bi-graph-up"></i> Gráfico do Dia
        </h2>
        <p class="text-muted">Variação de temperatura e umidade ao longo do dia.</p>
    </div>
</div>

<div class="card card-leitura p-4">
    <div class="chart-container">
        <canvas id="graficoSensor"></canvas>
    </div>
</div>

<div class="mt-3">
    <a href="{% url 'leituras:historico' %}" class="btn btn-outline-secondary">
        <i class="bi bi-table"></i> Ver como Tabela
    </a>
    <a href="{% url 'core:home' %}" class="btn btn-outline-secondary ms-2">
        <i class="bi bi-house"></i> Voltar ao Início
    </a>
</div>

{% endblock %}

{% block scripts_extras %}
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    // Dados de exemplo (serão substituídos por dados reais do banco de dados no futuro)
    const labels = ['08:00', '09:00', '10:00', '11:00', '12:00'];
    const dadosTemperatura = [28.5, 29.1, 30.2, 31.0, 31.8];
    const dadosUmidade = [65.0, 63.5, 61.0, 58.5, 56.0];

    const ctx = document.getElementById('graficoSensor').getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                {
                    label: 'Temperatura (°C)',
                    data: dadosTemperatura,
                    borderColor: '#dc3545',
                    backgroundColor: 'rgba(220, 53, 69, 0.1)',
                    borderWidth: 2,
                    tension: 0.4,
                    fill: true,
                },
                {
                    label: 'Umidade (%)',
                    data: dadosUmidade,
                    borderColor: '#0d6efd',
                    backgroundColor: 'rgba(13, 110, 253, 0.1)',
                    borderWidth: 2,
                    tension: 0.4,
                    fill: true,
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { position: 'top' },
                title: {
                    display: true,
                    text: 'Temperatura e Umidade — Hoje'
                }
            },
            scales: {
                y: {
                    beginAtZero: false,
                    grid: { color: 'rgba(0,0,0,0.05)' }
                }
            }
        }
    });
</script>
{% endblock %}
