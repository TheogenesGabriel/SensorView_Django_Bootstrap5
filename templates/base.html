<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}SensorView{% endblock %} | Monitor Ambiental</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f0f4f8;
            font-family: 'Segoe UI', sans-serif;
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.3rem;
        }
        .card-leitura {
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            border: none;
        }
        .valor-sensor {
            font-size: 3.5rem;
            font-weight: 700;
        }
        .badge-status-online {
            background-color: #28a745;
        }
        .badge-status-offline {
            background-color: #6c757d;
        }
        footer {
            margin-top: 60px;
            padding: 20px 0;
            color: #888;
            font-size: 0.85rem;
        }
    </style>

    {% block estilos_extras %}{% endblock %}
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'core:home' %}">
                <i class="bi bi-thermometer-half"></i> SensorView
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'core:home' %}">
                            <i class="bi bi-house"></i> Início
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'leituras:historico' %}">
                            <i class="bi bi-table"></i> Histórico
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'leituras:grafico' %}">
                            <i class="bi bi-graph-up"></i> Gráfico
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'core:sobre' %}">
                            <i class="bi bi-info-circle"></i> Sobre
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Conteúdo principal -->
    <main class="container my-4">
        {% block conteudo %}{% endblock %}
    </main>

    <!-- Rodapé -->
    <footer class="text-center">
        <div class="container">
            <p>SensorView &copy; 2025 — Monitor de Temperatura e Umidade Residencial</p>
        </div>
    </footer>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts_extras %}{% endblock %}
</body>
</html>
